<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Excel Agent</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:#0F172A;color:#F1F5F9;font-size:13px}
.header{background:#1E293B;border-bottom:1px solid #334155;padding:12px 14px}
.logo-row{display:-ms-flexbox;display:flex;-ms-flex-align:center;align-items:center;gap:10px}
.logo{background:#3B82F6;width:28px;height:28px;border-radius:7px;text-align:center;line-height:28px;font-size:14px}
.header h1{font-size:13px;font-weight:600;color:#F1F5F9}
.header p{font-size:10px;color:#94A3B8;margin-top:1px}
.body{padding:14px}
.section{margin-bottom:14px}
.lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:6px}
input,textarea{width:100%;background:#1E293B;border:1px solid #334155;border-radius:6px;color:#F1F5F9;font-family:Segoe UI,Arial,sans-serif;font-size:12px;padding:8px 10px}
textarea{min-height:70px;line-height:1.5}
.key-row{display:-ms-flexbox;display:flex;gap:6px}
.key-row input{-ms-flex:1;flex:1}
.btn-save{width:34px;height:34px;background:#1E293B;border:1px solid #334155;border-radius:6px;color:#94A3B8;cursor:pointer;font-size:14px}
.grid{display:-ms-flexbox;display:flex;-ms-flex-wrap:wrap;flex-wrap:wrap;gap:6px}
.qbtn{background:#1E293B;border:1px solid #334155;border-radius:6px;padding:7px 9px;color:#94A3B8;font-size:11px;cursor:pointer;width:calc(50% - 3px);text-align:left;font-family:Segoe UI,Arial,sans-serif}
.btn-run{width:100%;background:#3B82F6;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:600;padding:11px;cursor:pointer;font-family:Segoe UI,Arial,sans-serif}
.btn-run:disabled{opacity:.5;cursor:not-allowed}
.log-wrap{background:#060D18;border:1px solid #334155;border-radius:8px;overflow:hidden}
.log-bar{background:#1E293B;padding:7px 12px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#64748B;border-bottom:1px solid #334155}
.log-body{padding:10px 12px;min-height:90px;max-height:160px;overflow-y:auto;font-family:'Courier New',monospace;font-size:11px;line-height:1.8}
.l-info{color:#60A5FA;display:block}
.l-ok{color:#34D399;display:block}
.l-warn{color:#FBBF24;display:block}
.l-err{color:#F87171;display:block}
.l-dim{color:#64748B;display:block}
.banner{display:none;margin-bottom:12px;border-radius:6px;padding:9px 12px;font-size:12px;font-weight:500;border:1px solid}
.b-ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35);color:#34D399}
.b-err{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#F87171}
.note{font-size:10px;color:#64748B;margin-top:5px}
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo">&#9889;</div>
    <div>
      <h1>AI Excel Agent</h1>
      <p>Gemini-powered &bull; Free &bull; Self-healing</p>
    </div>
  </div>
</div>

<div class="body">

  <div class="section">
    <div class="lbl">&#128273; Gemini API Key (free)</div>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="AIza...  get free key at aistudio.google.com"/>
      <button class="btn-save" id="saveBtn" onclick="saveKey()">&#128190;</button>
    </div>
    <div class="note">Free tier: 15 req/min &bull; 1 million tokens/day &bull; no credit card needed</div>
  </div>

  <div class="section">
    <div class="lbl">&#128172; What should the agent do?</div>
    <textarea id="queryBox" placeholder="e.g. Average all marks of tutorials and practicals, add totals row, style headers dark blue bold white text"></textarea>
  </div>

  <div class="section">
    <div class="lbl">&#9889; Quick actions</div>
    <div class="grid">
      <button class="qbtn" onclick="setQ('Format headers: dark navy fill, white bold text size 11, auto-fit all columns, freeze row 1')">&#127912; Style headers</button>
      <button class="qbtn" onclick="setQ('Add alternating row colours: very light blue for odd rows, white for even rows. Add thin grey borders on all cells.')">&#129443; Zebra stripes</button>
      <button class="qbtn" onclick="setQ('Add a clustered bar chart using the data in this sheet. Place it two rows below the last data row.')">&#128202; Bar chart</button>
      <button class="qbtn" onclick="setQ('Add a colour scale conditional format on all numeric columns: green for highest values, red for lowest values.')">&#127777; Heat colours</button>
      <button class="qbtn" onclick="setQ('Sort all data by the first numeric column in descending order. Add a Rank column as the first column.')">&#128290; Sort + rank</button>
      <button class="qbtn" onclick="setQ('Create a new sheet called Summary with total, average, min and max for every numeric column, with professional dark header formatting.')">&#128203; Summary sheet</button>
      <button class="qbtn" onclick="setQ('Format all numeric columns as numbers with 2 decimal places. Format any date columns as DD/MM/YYYY.')">&#128178; Fix formats</button>
      <button class="qbtn" onclick="setQ('Add a Totals row at the very bottom with SUM formula for every numeric column. Make it bold with dark background and white text.')">&#43; Totals row</button>
    </div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="section">
    <button class="btn-run" id="runBtn" onclick="runAgent()">&#9889; Execute Task</button>
  </div>

  <div class="section">
    <div class="log-wrap">
      <div class="log-bar">&#9679;&#9679;&#9679;&nbsp;&nbsp;agent log</div>
      <div class="log-body" id="logBody">
        <span class="l-dim">-- Waiting for task...</span>
      </div>
    </div>
  </div>

</div>

<script>
var running = false;
var GURL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=';

var SYS = 'You are an expert Excel Office.js automation engineer.\n' +
'Write code that goes INSIDE Excel.run(async (context) => { YOUR CODE HERE }).\n\n' +
'STRICT RULES:\n' +
'1. Output ONLY raw JavaScript code. No markdown. No backticks. No explanations.\n' +
'2. Use var (not const/let) for IE11 compatibility.\n' +
'3. Always load properties before reading. Always call await context.sync() after loading and after making changes.\n' +
'4. Get sheet: var sheet = context.workbook.worksheets.getActiveWorksheet();\n' +
'5. Get data: var range = sheet.getUsedRange(); range.load(["values","rowCount","columnCount","address"]); await context.sync();\n' +
'6. Design colours: header="#1E293B" headerText="#FFFFFF" zebraA="#F8FAFC" zebraB="#EFF6FF" border="#CBD5E1" accent="#3B82F6"\n' +
'7. After formatting: range.format.autofitColumns();\n' +
'8. After header format: sheet.freezePanes.freezeRows(1);\n' +
'9. For cell borders use: var borders = cell.format.borders; borders.getItem("EdgeTop").style = "Continuous"; borders.getItem("EdgeTop").color = "#CBD5E1"; (repeat for EdgeBottom, EdgeLeft, EdgeRight)\n' +
'10. Always end with: await context.sync();\n' +
'11. Do NOT use fetch, XMLHttpRequest, or any network calls inside the code.\n' +
'12. Do NOT use const or let — only var.\n';

Office.onReady(function(info) {
  if (info.host === Office.HostType.Excel) {
    loadKey();
  }
});

function saveKey() {
  var key = document.getElementById('apiKey').value;
  if (!key || !key.trim()) { addLog('err', 'Please enter your API key first'); return; }
  try { localStorage.setItem('gkey', key.trim()); } catch(e) {}
  var btn = document.getElementById('saveBtn');
  btn.innerHTML = '&#10003;';
  btn.style.color = '#34D399';
  btn.style.borderColor = '#34D399';
  setTimeout(function() {
    btn.innerHTML = '&#128190;';
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 1500);
  addLog('ok', 'API key saved successfully');
}

function loadKey() {
  try {
    var k = localStorage.getItem('gkey');
    if (k) { document.getElementById('apiKey').value = k; }
  } catch(e) {}
}

function setQ(text) {
  document.getElementById('queryBox').value = text;
  document.getElementById('queryBox').focus();
}

function addLog(type, msg) {
  var body = document.getElementById('logBody');
  if (body.innerHTML.indexOf('Waiting') !== -1) { body.innerHTML = ''; }
  var d = document.createElement('span');
  d.className = 'l-' + type;
  var now = new Date();
  var ts = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  d.innerHTML = '<span style="color:#64748B">' + ts + '</span> ' + esc(msg);
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showBanner(type, msg) {
  var el = document.getElementById('banner');
  el.className = 'banner ' + (type === 'ok' ? 'b-ok' : 'b-err');
  el.style.display = 'block';
  el.innerHTML = msg;
}

function hideBanner() {
  document.getElementById('banner').style.display = 'none';
}

function setBusy(on) {
  var btn = document.getElementById('runBtn');
  btn.disabled = on;
  btn.innerHTML = on ? '&#9203; Agent running...' : '&#9889; Execute Task';
}

function getSchema() {
  return Excel.run(function(ctx) {
    var sheet = ctx.workbook.worksheets.getActiveWorksheet();
    var range = sheet.getUsedRange();
    sheet.load('name');
    range.load(['values', 'rowCount', 'columnCount', 'address']);
    return ctx.sync().then(function() {
      var vals = range.values;
      var headers = vals.length > 0 ? vals[0] : [];
      var sample = vals.slice(1, 5);
      var types = {};
      var i, r;
      for (i = 0; i < headers.length; i++) {
        var nums = 0;
        for (r = 0; r < sample.length; r++) {
          if (typeof sample[r][i] === 'number') nums++;
        }
        types[String(headers[i])] = nums > 0 ? 'number' : 'text';
      }
      return {
        sheetName: sheet.name,
        address: range.address,
        rowCount: range.rowCount,
        columnCount: range.columnCount,
        headers: headers,
        columnTypes: types,
        sample: sample
      };
    });
  });
}

function callGemini(key, query, schema, prevError, cb) {
  var userMsg = 'Sheet info:\n' + JSON.stringify(schema, null, 2) + '\n\nTask: ' + query;
  if (prevError) {
    userMsg += '\n\nPREVIOUS ATTEMPT FAILED WITH THIS ERROR - fix it:\n' + prevError.substring(0, 1500) + '\n\nRewrite the ENTIRE code from scratch. ONLY output raw JavaScript.';
  }

  var payload = JSON.stringify({
    system_instruction: { parts: [{ text: SYS }] },
    contents: [{ parts: [{ text: userMsg }] }],
    generationConfig: { temperature: 0.05, maxOutputTokens: 4096 }
  });

  var xhr;
  try {
    xhr = new XMLHttpRequest();
  } catch(e) {
    cb('Cannot create request: ' + e.message, null); return;
  }

  xhr.open('POST', GURL + key, true);
  xhr.setRequestHeader('Content-Type', 'application/json');

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 0) { cb('Network error — check internet connection', null); return; }
    if (xhr.status !== 200) {
      var em = 'API error ' + xhr.status;
      try { var ed = JSON.parse(xhr.responseText); if (ed && ed.error) em += ': ' + ed.error.message; } catch(pe) {}
      cb(em, null); return;
    }
    try {
      var data = JSON.parse(xhr.responseText);
      var code = data.candidates[0].content.parts[0].text || '';
      code = code.replace(/```javascript[\r\n]?/gi, '').replace(/```js[\r\n]?/gi, '').replace(/```[\r\n]?/g, '').trim();
      cb(null, code);
    } catch(pe) {
      cb('Could not parse Gemini response: ' + pe.message, null);
    }
  };

  try { xhr.send(payload); }
  catch(e) { cb('Send error: ' + e.message, null); }
}

function doExec(code) {
  return Excel.run(function(context) {
    try {
      var fn = new Function('context', code + '\nreturn Promise.resolve();');
      return fn(context).then(function() {
        return context.sync();
      });
    } catch(e) {
      return Promise.reject(e);
    }
  });
}

function attempt(key, query, schema, prevErr, n) {
  var MAX = 3;
  addLog('info', 'Attempt ' + n + '/' + MAX + ' - asking Gemini...');

  callGemini(key, query, schema, prevErr, function(genErr, code) {
    if (genErr) {
      addLog('err', 'Gemini: ' + genErr);
      if (n < MAX) {
        addLog('warn', 'Retrying in 2 seconds...');
        setTimeout(function() { attempt(key, query, schema, genErr, n + 1); }, 2000);
      } else {
        done(false, 'All attempts failed. Check your API key at aistudio.google.com');
      }
      return;
    }

    addLog('ok', 'Code received - running in Excel...');

    doExec(code).then(function() {
      addLog('ok', 'SUCCESS! Task completed on attempt ' + n);
      showBanner('ok', '&#10003; Done! Your Excel sheet has been updated.');
      setBusy(false);
      running = false;
    }, function(execErr) {
      var em = execErr.message || String(execErr);
      addLog('warn', 'Exec error: ' + em.substring(0, 120));
      if (n < MAX) {
        addLog('info', 'Self-repairing - attempt ' + (n+1) + '...');
        attempt(key, query, schema, em, n + 1);
      } else {
        done(false, 'Failed after 3 attempts. Try a simpler command.');
      }
    });
  });
}

function done(ok, msg) {
  if (!ok) { addLog('err', msg); showBanner('err', '&#10060; ' + msg); }
  setBusy(false);
  running = false;
}

function runAgent() {
  if (running) return;

  var key = document.getElementById('apiKey').value.trim();
  var query = document.getElementById('queryBox').value.trim();

  if (!key) {
    showBanner('err', '&#9888; Enter your Gemini API key first');
    addLog('err', 'No API key entered');
    return;
  }
  if (!query) {
    addLog('err', 'Please type a task or click a quick action');
    return;
  }

  running = true;
  hideBanner();
  setBusy(true);
  addLog('info', 'Starting: ' + query.substring(0, 55) + (query.length > 55 ? '...' : ''));

  getSchema().then(function(schema) {
    addLog('info', 'Read sheet "' + schema.sheetName + '" - ' + schema.rowCount + ' rows x ' + schema.columnCount + ' cols');
    attempt(key, query, schema, '', 1);
  }, function(schErr) {
    addLog('err', 'Cannot read sheet: ' + (schErr.message || schErr));
    showBanner('err', '&#10060; Could not read sheet. Open a workbook with data first.');
    setBusy(false);
    running = false;
  });
}
</script>
</body>
</html>
