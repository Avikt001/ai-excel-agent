<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Excel Agent</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0F172A;
      --surface:    #1E293B;
      --card:       #253447;
      --border:     #334155;
      --border-lg:  #475569;
      --text:       #F1F5F9;
      --muted:      #94A3B8;
      --hint:       #64748B;
      --blue:       #3B82F6;
      --blue-dim:   #1D4ED8;
      --blue-glow:  rgba(59,130,246,0.18);
      --green:      #10B981;
      --red:        #EF4444;
      --amber:      #F59E0B;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Inter', sans-serif;
      --r:          8px;
      --r-lg:       12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: var(--blue);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 13px; font-weight: 600; color: var(--text); }
    .header-text p  { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); margin-left: auto; flex-shrink: 0;
      box-shadow: 0 0 6px var(--green);
    }
    .status-dot.off { background: var(--hint); box-shadow: none; }

    /* ── Scroll body ────────────────────────────────────── */
    .body { flex: 1; overflow-y: auto; padding: 14px 14px 0; }
    .body::-webkit-scrollbar { width: 4px; }
    .body::-webkit-scrollbar-track { background: transparent; }
    .body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Sections ───────────────────────────────────────── */
    .section { margin-bottom: 14px; }
    .label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--hint);
      margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
    }

    /* ── Inputs ─────────────────────────────────────────── */
    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      padding: 8px 10px;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    input[type="password"] { font-family: var(--mono); letter-spacing: .05em; }
    input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    textarea { resize: vertical; min-height: 72px; line-height: 1.55; }

    /* ── Key row ────────────────────────────────────────── */
    .key-row { display: flex; gap: 6px; }
    .key-row input { flex: 1; }
    .btn-icon {
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all .15s;
    }
    .btn-icon:hover { border-color: var(--blue); color: var(--blue); }
    .btn-icon.saved { border-color: var(--green); color: var(--green); }

    /* ── Quick actions ──────────────────────────────────── */
    .quick-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .quick-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 7px 8px;
      color: var(--muted); font-size: 11px; font-family: var(--sans);
      cursor: pointer; text-align: left; transition: all .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .quick-btn:hover { border-color: var(--blue); color: var(--text); background: var(--card); }
    .quick-btn .qicon { font-size: 13px; flex-shrink: 0; }

    /* ── Run button ─────────────────────────────────────── */
    .btn-run {
      width: 100%;
      background: var(--blue);
      border: none; border-radius: var(--r);
      color: #fff; font-family: var(--sans);
      font-size: 13px; font-weight: 600;
      padding: 10px;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-run:hover { background: var(--blue-dim); transform: translateY(-1px); }
    .btn-run:active { transform: translateY(0); }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-run .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Log ────────────────────────────────────────────── */
    .log-wrap {
      background: #060D18;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .log-titlebar {
      background: var(--surface); padding: 7px 12px;
      display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .log-titlebar span { font-size: 10px; font-weight: 600; color: var(--hint); letter-spacing: .08em; text-transform: uppercase; }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-lg); }
    .log-dot.r { background: #EF4444; } .log-dot.y { background: #F59E0B; } .log-dot.g { background: #10B981; }
    .log-body {
      padding: 10px 12px; min-height: 90px; max-height: 160px;
      overflow-y: auto; font-family: var(--mono); font-size: 11px; line-height: 1.75;
    }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .log-line { display: flex; gap: 8px; }
    .log-line .ts { color: var(--hint); flex-shrink: 0; }
    .log-line.info .msg  { color: #60A5FA; }
    .log-line.ok   .msg  { color: #34D399; }
    .log-line.warn .msg  { color: #FBBF24; }
    .log-line.err  .msg  { color: #F87171; }
    .log-line.dim  .msg  { color: var(--hint); }

    /* ── Result banner ──────────────────────────────────── */
    .result-banner {
      display: none; margin-bottom: 14px;
      border-radius: var(--r); padding: 9px 12px;
      font-size: 12px; font-weight: 500;
      border: 1px solid;
    }
    .result-banner.success { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.3); color: #34D399; }
    .result-banner.error   { background: rgba(239,68,68,.1);  border-color: rgba(239,68,68,.3);  color: #F87171; }
    .result-banner.show    { display: block; }

    /* ── Retry badge ────────────────────────────────────── */
    .retry-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .retry-pip {
      width: 6px; height: 6px; border-radius: 50%; background: var(--border);
      transition: background .3s;
    }
    .retry-pip.active { background: var(--amber); box-shadow: 0 0 5px var(--amber); }
    .retry-pip.done   { background: var(--green); }
    .retry-pip.fail   { background: var(--red); }
    .retry-label { font-size: 10px; color: var(--hint); }

    /* ── Sheet info pill ────────────────────────────────── */
    .sheet-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 3px 9px; font-size: 11px; color: var(--muted);
    }
    .sheet-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left { font-size: 10px; color: var(--hint); }
    .btn-clear {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--hint);
      font-size: 10px; padding: 4px 9px; cursor: pointer;
      transition: all .15s;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* ── Divider ────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 4px 0 14px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>AI Excel Agent</h1>
      <p>Gemini-powered · Free · Self-healing</p>
    </div>
    <div class="status-dot off" id="statusDot"></div>
  </div>

  <!-- Scrollable body -->
  <div class="body">

    <!-- Sheet info -->
    <div class="section" id="sheetInfoSection" style="display:none">
      <div class="sheet-pill">
        <div class="dot"></div>
        <span id="sheetName">Sheet1</span>
        <span style="color:var(--hint)">·</span>
        <span id="sheetDims" style="color:var(--hint)">—</span>
      </div>
    </div>

    <!-- API Key -->
    <div class="section">
      <div class="label">🔑 Gemini API Key <span style="color:var(--green);font-weight:400;text-transform:none;letter-spacing:0">(free)</span></div>
      <div class="key-row">
        <input type="password" id="apiKey" placeholder="AIza…  — get free key at aistudio.google.com" />
        <button class="btn-icon" id="saveKeyBtn" title="Save key" onclick="saveKey()">💾</button>
      </div>
      <div style="margin-top:5px;font-size:10px;color:var(--hint)">
        Free tier: 15 req/min · 1 million tokens/day · no credit card needed
      </div>
    </div>

    <!-- Command -->
    <div class="section">
      <div class="label">💬 What should the agent do?</div>
      <textarea id="queryInput" placeholder="e.g. Make headers bold with dark blue fill and white text, auto-fit all columns, freeze the top row, and add alternating row colours"></textarea>
    </div>

    <!-- Quick actions -->
    <div class="section">
      <div class="label">⚡ Quick actions</div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="setQuery('Format headers: dark fill, white bold text, auto-fit columns, freeze row 1')"><span class="qicon">🎨</span>Style headers</button>
        <button class="quick-btn" onclick="setQuery('Add alternating row colours: light blue for odd rows, white for even rows. Add thin borders on all cells.')"><span class="qicon">🦓</span>Zebra stripes</button>
        <button class="quick-btn" onclick="setQuery('Add a bar chart showing the data from this sheet. Place it below the data.')"><span class="qicon">📊</span>Add bar chart</button>
        <button class="quick-btn" onclick="setQuery('Add conditional formatting: green fill for the top 10% values, red fill for the bottom 10% in all numeric columns.')"><span class="qicon">🌡️</span>Heat colours</button>
        <button class="quick-btn" onclick="setQuery('Sort the data by the first numeric column in descending order. Add a rank number in a new column A.')"><span class="qicon">🔢</span>Sort + rank</button>
        <button class="quick-btn" onclick="setQuery('Create a new sheet called Summary with totals, averages, min and max for each numeric column, beautifully formatted.')"><span class="qicon">📋</span>Summary sheet</button>
        <button class="quick-btn" onclick="setQuery('Format all number columns as currency with 2 decimal places. Format all date columns as DD/MM/YYYY.')"><span class="qicon">💲</span>Fix formats</button>
        <button class="quick-btn" onclick="setQuery('Add a totals row at the bottom with SUM formulas for every numeric column. Make it bold with a dark fill.')"><span class="qicon">➕</span>Totals row</button>
      </div>
    </div>

    <!-- Retry indicators -->
    <div class="retry-row" id="retryRow" style="display:none">
      <div class="retry-pip" id="pip1"></div>
      <div class="retry-pip" id="pip2"></div>
      <div class="retry-pip" id="pip3"></div>
      <span class="retry-label" id="retryLabel">Attempting…</span>
    </div>

    <!-- Run button -->
    <div class="section">
      <button class="btn-run" id="runBtn" onclick="runAgent()">
        <span id="runIcon">⚡</span>
        <span id="runLabel">Execute Task</span>
      </button>
    </div>

    <!-- Result banner -->
    <div class="result-banner" id="resultBanner"></div>

    <!-- Log -->
    <div class="section">
      <div class="log-wrap">
        <div class="log-titlebar">
          <div class="log-dot r"></div><div class="log-dot y"></div><div class="log-dot g"></div>
          <span style="margin-left:6px">agent log</span>
        </div>
        <div class="log-body" id="logBody">
          <div class="log-line dim"><span class="ts">—</span><span class="msg">Waiting for task…</span></div>
        </div>
      </div>
    </div>

  </div><!-- /body -->

  <!-- Footer -->
  <div class="footer">
    <span class="footer-left" id="footerInfo">Ready</span>
    <button class="btn-clear" onclick="clearAll()">Clear log</button>
  </div>

</div><!-- /app -->

<script>
// ─────────────────────────────────────────────────────────
// GEMINI CONFIG
// ─────────────────────────────────────────────────────────
const GEMINI_URL = key =>
  `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

const SYSTEM_PROMPT = `You are an elite Excel automation engineer. Write Office.js JavaScript code to fulfill the user's Excel task.

CRITICAL RULES:
1. Output ONLY raw JavaScript code. Zero markdown, zero backticks, zero explanations, zero comments.
2. Your code runs INSIDE Excel.run(async (context) => { YOUR CODE HERE }).
3. Always load properties before using them. Always call await context.sync() after loads and after changes.
4. Use const sheet = context.workbook.worksheets.getActiveWorksheet(); to get the active sheet.
5. Use const range = sheet.getUsedRange(); range.load(["values","rowCount","columnCount","address"]); await context.sync(); to get data.
6. Make outputs visually spectacular using these colours:
   DARK_HEADER = "#1E293B"  WHITE_TEXT = "#FFFFFF"  BLUE_ACCENT = "#3B82F6"
   ZEBRA_A = "#F8FAFC"  ZEBRA_B = "#EFF6FF"  BORDER = "#CBD5E1"
7. Always autofit columns: range.format.autofitColumns();
8. Always freeze header row if formatting: sheet.freezePanes.freezeRows(1);
9. For borders use: const b = cell.format.borders; b.getItem("EdgeTop").style="Continuous"; b.getItem("EdgeBottom").style="Continuous"; b.getItem("EdgeLeft").style="Continuous"; b.getItem("EdgeRight").style="Continuous"; b.getItem("EdgeTop").color="#CBD5E1";
10. End with await context.sync();

COMMON PATTERNS YOU MUST FOLLOW:
// Get cell range by index (0-based row, 0-based col):
  sheet.getRangeByIndexes(rowIndex, colIndex, rowCount, colCount)
// Set fill:
  range.format.fill.color = "#1E293B";
// Set font:
  range.format.font.bold = true; range.format.font.color = "#FFFFFF"; range.format.font.size = 11;
// Set alignment:
  range.format.horizontalAlignment = "Center";
// Number format:
  range.numberFormat = [["$#,##0.00"]]; // must be 2D array matching range dimensions
// Add table:
  const table = sheet.tables.add(usedRange.address, true);
  table.style = "TableStyleMedium2";
// Create chart:
  const chart = sheet.charts.add("ColumnClustered", dataRange, "Auto");
  chart.setPosition("A" + (lastRow + 2), "H" + (lastRow + 20));
  chart.title.text = "Chart Title";
// Conditional format - colour scale:
  const cf = range.conditionalFormats.add("ColorScale");
  cf.colorScale.criteria = {minimum:{formula:null,type:"LowestValue",color:"#F87171"}, maximum:{formula:null,type:"HighestValue",color:"#34D399"}};`;

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
let running = false;

// ─────────────────────────────────────────────────────────
// OFFICE INIT
// ─────────────────────────────────────────────────────────
Office.onReady(info => {
  if (info.host === Office.HostType.Excel) {
    document.getElementById('statusDot').classList.remove('off');
    loadSavedKey();
    refreshSheetInfo();
  }
});

async function refreshSheetInfo() {
  try {
    await Excel.run(async ctx => {
      const sheet = ctx.workbook.worksheets.getActiveWorksheet();
      const range = sheet.getUsedRange();
      sheet.load('name');
      range.load(['rowCount','columnCount']);
      await ctx.sync();
      document.getElementById('sheetName').textContent = sheet.name;
      document.getElementById('sheetDims').textContent = `${range.rowCount} rows × ${range.columnCount} cols`;
      document.getElementById('sheetInfoSection').style.display = '';
    });
  } catch(e) {}
}

// ─────────────────────────────────────────────────────────
// KEY MANAGEMENT
// ─────────────────────────────────────────────────────────
function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return;
  localStorage.setItem('gemini_api_key', key);
  const btn = document.getElementById('saveKeyBtn');
  btn.textContent = '✅';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = '💾'; btn.classList.remove('saved'); }, 1500);
  log('info', 'API key saved to local storage');
}

function loadSavedKey() {
  const saved = localStorage.getItem('gemini_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
}

// ─────────────────────────────────────────────────────────
// QUICK ACTIONS
// ─────────────────────────────────────────────────────────
function setQuery(text) {
  document.getElementById('queryInput').value = text;
  document.getElementById('queryInput').focus();
}

// ─────────────────────────────────────────────────────────
// LOGGING
// ─────────────────────────────────────────────────────────
function log(type, msg) {
  const body = document.getElementById('logBody');
  const now = new Date();
  const ts = now.toTimeString().slice(0,8);
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.innerHTML = `<span class="ts">${ts}</span><span class="msg">${escHtml(msg)}</span>`;
  if (body.querySelector('.log-line.dim')) body.innerHTML = '';
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────────
// RETRY PIPS
// ─────────────────────────────────────────────────────────
function setPip(n, state) {
  const pip = document.getElementById(`pip${n}`);
  if (pip) { pip.className = 'retry-pip ' + state; }
}
function showRetry(show) {
  document.getElementById('retryRow').style.display = show ? 'flex' : 'none';
}
function setRetryLabel(txt) {
  document.getElementById('retryLabel').textContent = txt;
}

// ─────────────────────────────────────────────────────────
// RESULT BANNER
// ─────────────────────────────────────────────────────────
function showResult(type, msg) {
  const el = document.getElementById('resultBanner');
  el.className = `result-banner ${type} show`;
  el.textContent = msg;
}
function hideResult() {
  document.getElementById('resultBanner').className = 'result-banner';
}

// ─────────────────────────────────────────────────────────
// GET SCHEMA FROM ACTIVE SHEET
// ─────────────────────────────────────────────────────────
async function getSheetSchema() {
  return Excel.run(async ctx => {
    const sheet = ctx.workbook.worksheets.getActiveWorksheet();
    const range = sheet.getUsedRange();
    sheet.load('name');
    range.load(['values','rowCount','columnCount','address']);
    await ctx.sync();

    const vals = range.values;
    const headers = vals[0] || [];
    const sample = vals.slice(1, 4);

    // Detect column types
    const types = headers.map((h, ci) => {
      const samples = sample.map(r => r[ci]).filter(v => v !== '' && v !== null);
      if (samples.length === 0) return 'empty';
      if (samples.every(v => typeof v === 'number')) return 'number';
      if (samples.every(v => typeof v === 'boolean')) return 'boolean';
      return 'text';
    });

    return {
      sheetName: sheet.name,
      address: range.address,
      rowCount: range.rowCount,
      columnCount: range.columnCount,
      headers,
      columnTypes: Object.fromEntries(headers.map((h,i) => [h, types[i]])),
      sampleRows: sample,
      totalDataRows: range.rowCount - 1
    };
  });
}

// ─────────────────────────────────────────────────────────
// CALL GEMINI
// ─────────────────────────────────────────────────────────
async function callGemini(apiKey, query, schema, errorFeedback = '') {
  let userContent = `Sheet schema:\n${JSON.stringify(schema, null, 2)}\n\nUser task: ${query}`;
  if (errorFeedback) {
    userContent += `\n\nYOUR PREVIOUS CODE FAILED WITH THIS ERROR — fix it completely:\n${errorFeedback}\n\nRewrite from scratch. Output ONLY raw JS code.`;
  }

  const res = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: [{ parts: [{ text: userContent }] }],
      generationConfig: { temperature: 0.05, maxOutputTokens: 4096 }
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`Gemini API error ${res.status}: ${err?.error?.message || res.statusText}`);
  }

  const data = await res.json();
  let code = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // Strip markdown if present
  code = code.replace(/```(?:javascript|js)?\n?/g, '').replace(/```/g, '').trim();
  return code;
}

// ─────────────────────────────────────────────────────────
// EXECUTE OFFICE.JS CODE
// ─────────────────────────────────────────────────────────
async function executeCode(code) {
  // Wrap in Excel.run
  const wrappedFn = new Function('Excel', `
    return Excel.run(async (context) => {
      ${code}
    });
  `);
  await wrappedFn(Excel);
}

// ─────────────────────────────────────────────────────────
// MAIN AGENT LOOP
// ─────────────────────────────────────────────────────────
async function runAgent() {
  if (running) return;

  const apiKey = document.getElementById('apiKey').value.trim();
  const query  = document.getElementById('queryInput').value.trim();

  if (!apiKey) { log('err', 'Enter a Gemini API key first'); showResult('error', '⚠️  No API key — get one free at aistudio.google.com'); return; }
  if (!query)  { log('err', 'Describe the task first'); return; }

  running = true;
  hideResult();
  setRunning(true);
  showRetry(true);
  log('info', `Task: ${query.slice(0,60)}${query.length > 60 ? '…' : ''}`);

  const MAX = 3;
  let errorFeedback = '';
  let schema;

  try {
    log('dim', 'Reading sheet schema…');
    schema = await getSheetSchema();
    log('info', `Sheet "${schema.sheetName}" — ${schema.rowCount} rows × ${schema.columnCount} cols`);
    await refreshSheetInfo();
  } catch(e) {
    log('err', `Cannot read sheet: ${e.message}`);
    showResult('error', '❌  Could not read the sheet. Is a workbook open?');
    setRunning(false); running = false; showRetry(false); return;
  }

  for (let attempt = 1; attempt <= MAX; attempt++) {
    setPip(attempt, 'active');
    setRetryLabel(`Attempt ${attempt}/${MAX}…`);
    log('info', `Attempt ${attempt}/${MAX} — generating code…`);

    let code;
    try {
      code = await callGemini(apiKey, query, schema, errorFeedback);
      log('ok', 'Code generated — executing in Excel…');
    } catch(e) {
      log('err', `Gemini error: ${e.message}`);
      setPip(attempt, 'fail');
      if (attempt === MAX) break;
      errorFeedback = e.message;
      continue;
    }

    try {
      await executeCode(code);
      setPip(attempt, 'done');
      setRetryLabel(`Done in ${attempt} attempt${attempt > 1 ? 's' : ''}`);
      log('ok', `✅  Task completed successfully!`);
      showResult('success', `✅  Done! Excel updated successfully.`);
      document.getElementById('footerInfo').textContent = `Last task: ${new Date().toLocaleTimeString()}`;
      setRunning(false); running = false;
      return;
    } catch(e) {
      const errMsg = e.message || String(e);
      log('warn', `Attempt ${attempt} failed: ${errMsg.slice(0,120)}`);
      setPip(attempt, 'fail');
      errorFeedback = errMsg;
      if (attempt < MAX) log('info', 'Feeding error back to Gemini for self-repair…');
    }
  }

  log('err', '🛑  All attempts failed. Try a simpler command or check column names.');
  showResult('error', '❌  Failed after 3 attempts. Try rephrasing the task.');
  setRetryLabel('Failed — try again');
  setRunning(false); running = false;
}

// ─────────────────────────────────────────────────────────
// UI STATE
// ─────────────────────────────────────────────────────────
function setRunning(on) {
  const btn  = document.getElementById('runBtn');
  const icon = document.getElementById('runIcon');
  const lbl  = document.getElementById('runLabel');
  btn.disabled = on;
  if (on) {
    icon.outerHTML = '<div id="runIcon" class="spinner"></div>';
    lbl.textContent = 'Agent running…';
  } else {
    document.getElementById('runIcon').outerHTML = '<span id="runIcon">⚡</span>';
    lbl.textContent = 'Execute Task';
  }
}

function clearAll() {
  document.getElementById('logBody').innerHTML =
    '<div class="log-line dim"><span class="ts">—</span><span class="msg">Log cleared.</span></div>';
  hideResult();
  showRetry(false);
  document.getElementById('footerInfo').textContent = 'Ready';
  for(let i=1;i<=3;i++) setPip(i,'');
}

// Allow Ctrl+Enter to run
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runAgent();
});
</script>
